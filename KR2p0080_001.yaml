body:
  text: 有惶將起今兮助余教保子今兮使遊於仁今兮自悔今兮有過而能改今兮無奉有風今兮同奉異心今兮有奉離居而同欲今兮周流天下今兮將莫惶今兮有不善心耳今兮莫不變改今兮如女子將泣今兮若余子力今兮族奏蹴緩緩必溪毋忤今兮日月昭明今兮視毋以三誑大路今兮敦周葳椒槭檄與楮今兮慮余子其速長今兮能與余相助惠今兮可期冀成夫今兮能為余拔拜楮極今兮
